steps:
  # Artifact Upload Step - Creates test artifacts for download tests
  - label: ":package: Upload Test Artifacts"
    command: |
      echo "Creating test artifacts..."
      mkdir -p test-artifacts
      echo "Test file 1 content" > test-artifacts/test1.txt
      echo "Test file 2 content" > test-artifacts/test2.txt
      echo "Build info: ${BUILDKITE_BUILD_NUMBER}" > test-artifacts/build-info.txt
      ls -la test-artifacts/
    artifact_paths: "test-artifacts/*"
    agents:
      queue: "mac"

  # Mac tests (WITH experiment flag)
  - label: ":white_check_mark: Mac - Docker Plugin"
    command: |
      printenv | grep "^BUILDKITE_GIT_" | sort || echo "No BUILDKITE_GIT vars"
      printenv | grep "^BUILDKITE_TRACING_" | sort || echo "No BUILDKITE_TRACING vars"
    plugins:
      - docker#v5.11.0:
          image: "alpine:latest"
          propagate-environment: true
    agents:
      queue: "mac"
    depends_on: "upload-test-artifacts"

  - label: ":white_check_mark: Mac - Docker Compose Plugin"
    plugins:
      - docker-compose#v4.16.0:
          run: app
          propagate-environment: true
          command: 
            - sh
            - -c
            - |
              printenv | grep "^BUILDKITE_GIT_" | sort || echo "No BUILDKITE_GIT vars"
              printenv | grep "^BUILDKITE_TRACING_" | sort || echo "No BUILDKITE_TRACING vars"
    agents:
      queue: "mac"
    depends_on: "upload-test-artifacts"

  - label: ":white_check_mark: Mac - Artifacts Plugin"
    command: |
      printenv | grep "^BUILDKITE_GIT_" | sort || echo "No BUILDKITE_GIT vars"
      printenv | grep "^BUILDKITE_TRACING_" | sort || echo "No BUILDKITE_TRACING vars"
      echo "Testing artifacts plugin with propagate-environment"
      echo "Downloaded artifacts:"
      ls -la test-artifacts/ || echo "No artifacts downloaded"
      cat test-artifacts/build-info.txt || echo "Could not read build info"
    plugins:
      - artifacts#v1.9.4:
          download: "test-artifacts/*"
          propagate-environment: true
    agents:
      queue: "mac"
    depends_on: "upload-test-artifacts"

  # Linux tests (NO experiment flag)
  - label: ":x: Linux - Docker Plugin"
    command: |
      printenv | grep "^BUILDKITE_GIT_" | sort || echo "No BUILDKITE_GIT vars"
      printenv | grep "^BUILDKITE_TRACING_" | sort || echo "No BUILDKITE_TRACING vars"
    plugins:
      - docker#v5.11.0:
          image: "alpine:latest"
          propagate-environment: true
    agents:
      queue: "linux"

  - label: ":x: Linux - Docker Compose Plugin"
    plugins:
      - docker-compose#v4.16.0:
          run: app
          propagate-environment: true
          command: 
            - sh
            - -c
            - |
              printenv | grep "^BUILDKITE_GIT_" | sort || echo "No BUILDKITE_GIT vars"
              printenv | grep "^BUILDKITE_TRACING_" | sort || echo "No BUILDKITE_TRACING vars"
    agents:
      queue: "linux"

  - label: ":x: Linux - Artifacts Plugin"
    command: |
      printenv | grep "^BUILDKITE_GIT_" | sort || echo "No BUILDKITE_GIT vars"
      printenv | grep "^BUILDKITE_TRACING_" | sort || echo "No BUILDKITE_TRACING vars"
      echo "Testing artifacts plugin with propagate-environment"
      echo "Downloaded artifacts:"
      ls -la test-artifacts/ || echo "No artifacts downloaded"
      cat test-artifacts/build-info.txt || echo "Could not read build info"
    plugins:
      - artifacts#v1.9.4:
          download: "test-artifacts/*"
          propagate-environment: true
    agents:
      queue: "linux"
    depends_on: "upload-test-artifacts"
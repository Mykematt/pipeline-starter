steps:
  - label: ":docker: Build & Test with Docker Compose"
    command: "npm test"
    plugins:
      - docker-compose#v4.16.0:
          run: test
          quiet-pull: true
       
  - label: ":rocket: Start App Service"
    command: "echo 'Starting app and validating it runs'"
    plugins:
      - docker-compose#v4.16.0:
          run: app
          command: ["sh", "-c", "npm start & sleep 10 && curl -s http://localhost:3000/health && echo '✅ App started successfully!'"]
          quiet-pull: true
notify:
  - webhook: "https://webhook.site/fde6c075-f0d1-4b8a-81af-8fd5244286c0"
steps:
  - label: ":docker: Test Docker Plugin Environment Propagation"
    plugins:
      - docker#v5.11.0:
          image: "alpine:3.18"
          propagate-environment: true
          command: ["sh", "-c", "echo '=== Docker Plugin Test ==='; echo 'Git Config Variables:'; printenv | grep '^BUILDKITE_GIT_' | sort || echo 'No BUILDKITE_GIT vars'; echo 'Tracing Variables:'; printenv | grep '^BUILDKITE_TRACING_' | sort || echo 'No BUILDKITE_TRACING vars'; echo 'Signing Variables:'; printenv | grep '^BUILDKITE_AGENT_' | sort || echo 'No BUILDKITE_AGENT vars'; echo 'Build Config Variables:'; printenv | grep '^BUILDKITE_COMMAND_EVAL\\|^BUILDKITE_SHELL\\|^BUILDKITE_PLUGINS_ENABLED' | sort || echo 'No build config vars'"]
    agents:
      queue: "mac"

  - label: ":docker: Test Docker Compose Plugin Environment Propagation"
    plugins:
      - docker-compose#v4.16.0:
          run: app
          propagate-environment: true
          command: ["sh", "-c", "echo '=== Docker Compose Plugin Test ==='; echo 'Git Config Variables:'; printenv | grep '^BUILDKITE_GIT_' | sort || echo 'No BUILDKITE_GIT vars'; echo 'Tracing Variables:'; printenv | grep '^BUILDKITE_TRACING_' | sort || echo 'No BUILDKITE_TRACING vars'; echo 'Signing Variables:'; printenv | grep '^BUILDKITE_AGENT_' | sort || echo 'No BUILDKITE_AGENT vars'; echo 'Build Config Variables:'; printenv | grep '^BUILDKITE_COMMAND_EVAL\\|^BUILDKITE_SHELL\\|^BUILDKITE_PLUGINS_ENABLED' | sort || echo 'No build config vars'"]
    agents:
      queue: "mac"

  - label: ":test_tube: Control Test - Without Experiment"
    plugins:
      - docker#v5.11.0:
          image: "alpine:3.18"
          propagate-environment: true
          command: ["sh", "-c", "echo '=== Control Test (No Experiment) ==='; echo 'Should only see pre-existing vars, not new agent config vars'; echo 'Git Config Variables:'; printenv | grep '^BUILDKITE_GIT_' | sort || echo 'No BUILDKITE_GIT vars (expected)'; echo 'Tracing Variables:'; printenv | grep '^BUILDKITE_TRACING_' | sort || echo 'No BUILDKITE_TRACING vars'; echo 'Signing Variables:'; printenv | grep '^BUILDKITE_AGENT_' | sort || echo 'No BUILDKITE_AGENT vars'"]
    agents:
      queue: "linux"
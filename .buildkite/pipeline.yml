steps:
  - label: ":kubernetes: Test Git Clone Flags"
    command: |
      echo "=== Testing checkout container environment ==="
      echo "BUILDKITE_GIT_CLONE_FLAGS: $BUILDKITE_GIT_CLONE_FLAGS"
      env | grep BUILDKITE_GIT || echo "No BUILDKITE_GIT variables found"
      echo "=== Git version and config ==="
      git --version
      git config --list | head -10
      echo "=== Creating test pod in cluster ==="
      kubectl create job test-git-flags-$BUILDKITE_BUILD_NUMBER --image=alpine:3.18 -- sh -c "echo 'Git flags test completed'; sleep 5"
      kubectl wait --for=condition=complete job/test-git-flags-$BUILDKITE_BUILD_NUMBER --timeout=60s
      kubectl logs job/test-git-flags-$BUILDKITE_BUILD_NUMBER
      kubectl delete job test-git-flags-$BUILDKITE_BUILD_NUMBER
    agents:
      queue: "kubernetes"

  
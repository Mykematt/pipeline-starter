steps:
  - label: ":test_tube: Mac (with experiment)"
    agents:
      queue: "mac"
    plugins:
      - docker#v5.11.0:
          image: "alpine:3.18"
          propagate-environment: true
          command: printenv | grep "^BUILDKITE_TRACING_\|^BUILDKITE_GIT_"
      - docker-compose#v4.16.0:
          run: app
          propagate-environment: true
          command: printenv | grep "^BUILDKITE_TRACING_\|^BUILDKITE_GIT_"

  - label: ":test_tube: Linux (without experiment)"
    agents:
      queue: "linux"
    plugins:
      - docker#v5.11.0:
          image: "alpine:3.18"
          propagate-environment: true
          command: printenv | grep "^BUILDKITE_TRACING_\|^BUILDKITE_GIT_"
      - docker-compose#v4.16.0:
          run: app
          propagate-environment: true
          command: printenv | grep "^BUILDKITE_TRACING_\|^BUILDKITE_GIT_"

steps:
  # Install Dependencies
  - label: ":python: Install Dependencies"
    command: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt
    key: "install"
    
  # Run All Tests
  - label: ":pytest: Run All Tests"
    command: |
      # Set up test analytics token from environment
      export BUILDKITE_ANALYTICS_TOKEN=$BUILDKITE_ANALYTICS_TOKEN
      
      # Run all tests 
      python -m pytest tests/ --verbose --tb=short
    depends_on: "install"
    key: "test-all"
      
  # Flaky Test Run #1
  - label: ":game_die: Flaky Test Run #1"
    command: |
      echo "Running flaky tests - Attempt #1"
      export BUILDKITE_ANALYTICS_TOKEN=$BUILDKITE_ANALYTICS_TOKEN
      
      # Run only the flaky tests
      python -m pytest tests/test_flaky.py --verbose --tb=short
    depends_on: "install"
    key: "flaky-test-1"
    
  # Flaky Test Run #2
  - label: ":game_die: Flaky Test Run #2" 
    command: |
      echo "Running flaky tests - Attempt #2"
      export BUILDKITE_ANALYTICS_TOKEN=$BUILDKITE_ANALYTICS_TOKEN
      
      # Run only the flaky tests (same tests, different outcome expected)
      python -m pytest tests/test_flaky.py --verbose --tb=short
    depends_on: "install"
    key: "flaky-test-2"
    
  # Flaky Test Run #3
  - label: ":game_die: Flaky Test Run #3"
    command: |
      echo "Running flaky tests - Attempt #3" 
      export BUILDKITE_ANALYTICS_TOKEN=$BUILDKITE_ANALYTICS_TOKEN
      
      # Run only the flaky tests (same tests, different outcome expected)
      python -m pytest tests/test_flaky.py --verbose --tb=short
    depends_on: "install"
    key: "flaky-test-3"
    
  # Stable Tests (Control Group)
  - label: ":bar_chart: Stable Tests (Control Group)"
    command: |
      echo "Running stable tests as control group"
      export BUILDKITE_ANALYTICS_TOKEN=$BUILDKITE_ANALYTICS_TOKEN
      
      # Run only stable tests (should always pass)
      python -m pytest tests/test_stable.py --verbose --tb=short
    depends_on: "install"
    key: "stable-tests"